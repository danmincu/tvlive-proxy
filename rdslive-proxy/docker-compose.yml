services:
  rdslive-proxy:
    build: .
    image: rdslive-proxy
    container_name: rdslive-proxy
    ports:
      - "13001:13001"   # http  — media, VLC, Chromecast
      - "13443:13443"   # https — player page / Chromecast button
    restart: unless-stopped
    environment:
      # Pre-load a stream so it auto-plays for every visitor (optional):
      # PROXY_PLAYLIST_URL: "https://alpha1.yosefina1.cfd/ah1/usergenx304Jtlrnd2-got.htm"
      PROXY_ORIGIN: "https://canale-tv.net"
      PROXY_REFERER: "https://canale-tv.net/"
      # Chromecast media host (the proxy's LAN IP) so casting works even when the
      # player is opened via a DDNS/public hostname. run.sh auto-detects and exports
      # this; empty falls back to the browser's hostname. Override: PROXY_CAST_HOST=<ip> ./run.sh
      PROXY_CAST_HOST: "${PROXY_CAST_HOST:-}"
      # Upstream resilience (optional): per-attempt timeout and extra retries on
      # transient failures (timeouts, connection errors, 5xx/408/429).
      # PROXY_TIMEOUT_SECONDS: "15"
      # PROXY_RETRIES: "2"
      # DVR: continuously record the active stream to disk for timeshift/seek and
      # .ts export. Stored under /app/dvr (persisted via the volume below).
      # Disk use ~= bitrate; e.g. 3 Mbps ~= 1.4 GB/h ~= 32 GB for 24h.
      PROXY_DVR_ENABLED: "true"
      PROXY_DVR_HOURS: "24"
      # PROXY_DVR_POLL_SECONDS: "4"
      # Live fan-out: with DVR on, ALL viewers are served from the local buffer at the
      # live edge, so the provider only sees the single recorder ingest no matter how
      # many people watch. Bigger window = a bit more delay but more resilient to stalls.
      # PROXY_LIVE_SEGMENTS: "8"
      # If no new segment is recorded for this many seconds while a stream is set, the
      # live edge is treated as "stalled" (e.g. the provider token expired and it now
      # returns a frozen playlist) so the UI warns instead of silently freezing.
      # PROXY_STALL_SECONDS: "45"
      # Password required to permanently wipe ALL recordings via the UI "Wipe" button
      # (POST /dvr/clear). Change this from the default if the player is reachable publicly.
      PROXY_DVR_WIPE_PASSWORD: "bibita"
      # Safety net: prune oldest recordings if free disk drops below this many GB
      # (independent of the 24h window). 0 disables. Protects against a full disk.
      PROXY_DVR_MIN_FREE_GB: "10"
      # Shared secret the auto-resolver uses to update the source URL via /admin/source.
      # MUST be changed from the default — the proxy is reachable publicly on 13443.
      PROXY_ADMIN_TOKEN: "${PROXY_ADMIN_TOKEN:-change-me-please}"
    volumes:
      - dvr-data:/app/dvr   # recordings persist across container rebuilds

  # Auto-resolver: headless Chromium that discovers the rotating playlist URL from the
  # public player page and pushes it to the proxy. Talks to the proxy over the internal
  # network (no public exposure). See resolver/README and ./resolver.
  resolver:
    build: ./resolver
    image: rdslive-resolver
    container_name: rdslive-resolver
    depends_on:
      - rdslive-proxy
    restart: unless-stopped
    environment:
      PROXY_BASE: "http://rdslive-proxy:13001"
      PROXY_ADMIN_TOKEN: "${PROXY_ADMIN_TOKEN:-change-me-please}"
      SOURCE_PAGE: "https://rdslive.org/antena-1/"
      SOURCE_REFERER: "https://rdslive.org/"
      # Alternative if the wrapper misbehaves — load the embedded player directly:
      #   SOURCE_PAGE: "https://rdslive.org/tv.php?id=a1"
      #   SOURCE_REFERER: "https://rdslive.org/antena-1/"
      PROXY_ORIGIN: "https://canale-tv.net"
      PROXY_REFERER: "https://canale-tv.net/"
      # RESOLVE_POLL_SECONDS: "30"     # how often to check proxy /health
      # RESOLVE_PERIODIC_HOURS: "4"    # proactive re-resolve interval
      # RESOLVE_MIN_INTERVAL_SEC: "120"# never resolve more often than this
      # RESOLVE_PATTERN: "\\.cfd/.*-got\\.htm"  # regex for the playlist request URL

volumes:
  dvr-data:
