services:
  rdslive-proxy:
    build: .
    image: rdslive-proxy
    container_name: rdslive-proxy
    ports:
      - "13001:13001"   # http  — media, VLC, Chromecast
      - "13443:13443"   # https — player page / Chromecast button
    restart: unless-stopped
    environment:
      # Pre-load a stream so it auto-plays for every visitor (optional):
      # PROXY_PLAYLIST_URL: "https://alpha1.yosefina1.cfd/ah1/usergenx304Jtlrnd2-got.htm"
      PROXY_ORIGIN: "https://canale-tv.net"
      PROXY_REFERER: "https://canale-tv.net/"
      # For Chromecast when reaching the player via a DDNS/public hostname: the
      # proxy's LAN IP, so the Chromecast fetches media locally (no router port needed).
      PROXY_CAST_HOST: "192.168.1.54"
